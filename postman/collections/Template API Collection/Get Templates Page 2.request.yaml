$kind: http-request
url: "{{base_url}}/api/templates?page=2&limit=10"
method: GET
headers:
  Content-Type: application/json
queryParams:
  page: "2"
  limit: "10"
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status code is 200', function () {
          pm.response.to.have.status(200);
      });

      pm.test('Pagination page is correct', function () {
          const responseJson = pm.response.json();
          pm.expect(responseJson.pagination.page).to.equal(2);
      });
    language: text/javascript
order: 3000
