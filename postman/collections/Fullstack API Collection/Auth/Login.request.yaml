$kind: http-request
url: "{{base_url}}/api/auth/login"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "identifier": "admin",
      "password": "password123"
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status code is 200', function () {
          pm.response.to.have.status(200);
      });

      pm.test('Response has success and token', function () {
          const responseJson = pm.response.json();
          pm.expect(responseJson).to.have.property('success', true);
          pm.expect(responseJson).to.have.property('data');
          pm.expect(responseJson.data).to.have.property('token');
      });

      // Save token to environment
      const responseJson = pm.response.json();
      pm.environment.set('auth_token', responseJson.data.token);
      pm.environment.set('user_id', responseJson.data.user.id);
    language: text/javascript
order: 1000
